services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_APP_URL=${VITE_APP_URL:-}
        - VITE_VALIDATE_URL=${VITE_VALIDATE_URL:-}
        - VITE_BRAND_NAME=${VITE_BRAND_NAME:-Whitelabel Learn}
        - VITE_BRAND_SHORT=${VITE_BRAND_SHORT:-Curso}
        - VITE_BRAND_TAGLINE=${VITE_BRAND_TAGLINE:-Aprenda passo a passo}
        - VITE_BRAND_STORAGE_PREFIX=${VITE_BRAND_STORAGE_PREFIX:-wl-course}
        - VITE_BRAND_CERT_WATERMARK=${VITE_BRAND_CERT_WATERMARK:-W H I T E L A B E L   L E A R N}
    restart: always
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-mastery}:${POSTGRES_PASSWORD:-mastery_secret}@db:5432/${POSTGRES_DB:-wl_course}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wl_course}
      - POSTGRES_USER=${POSTGRES_USER:-mastery}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mastery_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mastery} -d ${POSTGRES_DB:-wl_course}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
