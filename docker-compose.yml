services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-mastery}:${POSTGRES_PASSWORD:-mastery_secret}@db:5432/${POSTGRES_DB:-claude_mastery}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-claude_mastery}
      - POSTGRES_USER=${POSTGRES_USER:-mastery}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mastery_secret}
    ports:
      - "${DB_PORT:-5435}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mastery} -d ${POSTGRES_DB:-claude_mastery}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
